name: iOS Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Standard version for macOS runners
          bundler-cache: true

      - name: Install Dependencies
        run: npm install

      - name: Prebuild iOS Folder
        # This creates the /ios folder that was missing
        run: npx expo prebuild --platform ios

      - name: Run Fastlane Build
        # We run it from the root since 'expo prebuild' creates the workspace
        run: bundle exec fastlane build_sideload
        env:
          CI: true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: ios/*.ipa